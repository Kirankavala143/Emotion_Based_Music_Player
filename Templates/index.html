<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎵 Emotion Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Roboto', sans-serif;
    margin: 0;
    padding: 0;
    color: #fff;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
}
h1 { text-align: center; margin: 20px 0; }
.container { display: flex; gap: 20px; width: 90%; max-width: 1200px; margin: auto; }
.card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; box-shadow: 0 0 30px rgba(255,255,255,0.2); backdrop-filter: blur(15px); }
.left-panel, .right-panel { flex: 1; }
button { padding: 10px 20px; margin: 6px; border-radius: 12px; border: none; background: linear-gradient(45deg, #ff6ec7, #7873f5); color: white; font-weight: bold; cursor: pointer; }
.combined-left-card { display: flex; flex-direction: column; gap: 20px; }
.section-block { background: rgba(255,255,255,0.04); border-radius: 18px; padding: 15px; text-align: center; }
.image-box img { width: 80%; max-width: 400px; border-radius: 15px; }
.multi-face-card { background: rgba(255,255,255,0.08); border-radius: 15px; padding: 12px; margin-bottom: 12px; }
.emotion-value { font-size: 1.3rem; font-weight: bold; }
.emotion-emoji { font-size: 1.3rem; margin-right: 8px; }
.emotion-suggestion { margin-top: 6px; font-style: italic; color: #ffd6ff; }
.song-item { padding: 8px; border-radius: 10px; background: rgba(255,255,255,0.1); margin-bottom: 6px; cursor: pointer; text-align: center; font-size: 0.95rem; }
.song-item.playing { background: linear-gradient(90deg, #1db954, #1ed760); color: #fff; }
audio { display: block; margin-top: 8px; width: 100%; }

/* RIGHT PANEL EMOTION CARDS */
.emotion-card {
    padding: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    text-align: center;
    font-weight: bold;
    font-size: 0.95rem;
    transition: transform 0.2s;
}
.emotion-card:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.12);
}
.emotion-card-heading {
    padding: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    margin-bottom: 6px;
    text-align: center;
    font-weight: bold;
    font-size: 0.95rem;
}
/* ------------------ Spotify-style song hover ------------------ */
.song-item:hover {
    transform: translateX(5px);
    background: rgba(255,255,255,0.15);
    transition: 0.2s;
}

/* Currently playing song */
.song-item.playing {
    background: linear-gradient(90deg, #1db954, #1ed760); /* Spotify green */
    color: #fff;
    font-weight: bold;
}

.song-item audio {
    display: block; /* show only for currently playing */
    margin-top: 5px;
    width: 100%;
}
/* Spotify-style playing bars */
.song-wave {
    display: inline-block;
    margin-left: 8px;
    width: 4px;
    height: 14px;
    background: #1db954; /* Spotify green */
    animation: wave 1s infinite;
    vertical-align: middle;
}

.song-wave:nth-child(1) { animation-delay: 0s; }
.song-wave:nth-child(2) { animation-delay: 0.2s; }
.song-wave:nth-child(3) { animation-delay: 0.4s; }

@keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 16px; }
}
.song-wave-container {
    display: inline-flex;
    align-items: flex-end;
}

</style>
</head>

<body>
<h1>🎵 Emotion Music Player</h1>

<div class="container">

<!-- LEFT PANEL -->
<div class="left-panel">
<div class="card combined-left-card">

<div class="section-block">
<h3>Choose Input Method</h3>
<button id="chooseUploadBtn" type="button">Upload Image</button>
<button id="chooseWebcamBtn" type="button">Use Webcam</button>

<div id="uploadSection" style="display:none;">
    <input type="file" id="uploadImage" accept="image/*"><br><br>
    <button id="uploadBtn" type="button">Detect</button>
</div>

<div id="webcamSection" style="display:none; text-align:center;">
    <video id="video" autoplay style="width: 400px; height: auto; border: 1px solid #ccc; border-radius:8px;"></video>
    <div style="margin-top: 10px;">
        <button id="startWebcamBtn">Start Webcam</button>
        <button id="stopWebcamBtn" style="display:none;">Stop Webcam</button>
        <button id="captureBtn">Capture</button>
    </div>
</div>


</div>

<div class="section-block image-box">
<img id="uploadedImagePreview" src="">
</div>

<div class="section-block">
<div id="multiFaceResults"></div>
<div id="detectedEmotion" class="emotion-value"></div>
</div>

</div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
<div class="card" id="songList">
<!-- Emotion cards and songs will be dynamically added here -->
</div>
</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
